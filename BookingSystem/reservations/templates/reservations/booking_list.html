{% extends 'reservations/base.html' %}
{% block content %}
<h2>My Bookings</h2>
<table class="table table-striped">
<thead>
<tr>
<th>Room</th>
<th>Start</th>
<th>End</th>
<th>Status</th>
</tr>
</thead>
<tbody>
{% for booking in bookings %}
<tr>
<td>{{ booking.room.name }}</td>
<td>{{ booking.start_time }}</td>
<td>{{ booking.end_time }}</td>
<td>{{ booking.status }}</td>
</tr>
{% endfor %}
</tbody>
</table>
{% endblock %}
