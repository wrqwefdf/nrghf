
{% extends 'reservations/base.html' %}

{% block content %}
<h2>Available Rooms</h2>

<div class="row">
    {% for room in rooms %}
    <div class="col-md-4">
        <div class="card mb-3">
            <div class="card-body">
                <h5 class="card-title">{{ room.name }}</h5>
                <p>Type: {{ room.room_type }}</p>
                <p>Capacity: {{ room.capacity }}</p>
                <p>Price per hour: ${{ room.price_per_hour }}</p>

                <a href="/book/" class="btn btn-primary">
                    Book
                </a>
            </div>
        </div>
    </div>
    {% endfor %}
</div>

{% endblock %}
