{% extends 'reservations/base.html' %}

{% block content %}

<h2>Create Booking</h2>

<form method="post">

{% csrf_token %}

<div class="mb-3">
<label class="form-label">Room</label>
{{ form.room }}
</div>

<div class="mb-3">
<label class="form-label">Start Time</label>
{{ form.start_time }}
</div>

<div class="mb-3">
<label class="form-label">End Time</label>
{{ form.end_time }}
</div>
{% endblock %}
